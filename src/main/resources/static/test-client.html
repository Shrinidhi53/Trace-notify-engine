<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Trace Notify - WS Test Client</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        #messages { border: 1px solid #ccc; padding: 1rem; margin-top: 1rem; min-height: 200px; }
        .msg { padding: .5rem; border-bottom: 1px solid #eee; }
        input { width: 480px; }
    </style>
</head>
<body>
<h2>Trace Notify WebSocket Client</h2>
<p>Paste your JWT (from /auth/login) and connect.</p>
<input id="token" placeholder="JWT token"/>
<button onclick="connect()">Connect</button>
<button onclick="disconnect()">Disconnect</button>
<div id="status">Disconnected</div>
<div id="messages"></div>

<script>
    let stompClient = null;

    function connect() {
        const token = document.getElementById('token').value;
        const socket = new SockJS('/ws?token=' + encodeURIComponent(token));
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function () {
            document.getElementById('status').innerText = 'Connected';
            stompClient.subscribe('/user/queue/notifications', function (message) {
                const body = JSON.parse(message.body);
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerText = '[' + body.priority + '] ' + body.title + ' - ' + body.message;
                document.getElementById('messages').prepend(div);
            });
        }, function (err) {
            document.getElementById('status').innerText = 'Error: ' + err;
        });
    }

    function disconnect() {
        if (stompClient) stompClient.disconnect();
        document.getElementById('status').innerText = 'Disconnected';
    }
</script>
</body>
</html>
